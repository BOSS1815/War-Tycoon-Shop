<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG BOSS STORE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffd700;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.hero{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
color:#ddd;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#ffd700;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:8px;
}

.products{
padding:80px 8%;
}

.section-title{
text-align:center;
font-size:35px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#ffd700;
font-size:22px;
margin:10px 0;
}

.buy{
display:block;
text-align:center;
background:#ffd700;
color:black;
padding:10px;
text-decoration:none;
font-weight:bold;
border-radius:8px;
}

footer{
padding:30px;
text-align:center;
background:#111;
margin-top:50px;
}
</style>

</head>
<body>

<header>
<div class="logo">BIG BOSS STORE</div>

<nav>
<a href="#">หน้าแรก</a>
<a href="#shop">สินค้า</a>
<a href="https://discord.gg/3ZcWfvKfN" target="_blank">Discord</a>
</nav>
</header>

<section class="hero">
<div>
<h1>BIG BOSS STORE</h1>
<p>ร้านค้าWar tycoon รวดเร็ว ปลอดภัย</p>
<a class="btn" href="#shop">เลือกซื้อสินค้า</a>
</div>
</section>

<section class="products" id="shop">

<h2 class="section-title">สินค้าแนะนำ</h2>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/400/300?1">
<div class="card-content">
<h3>VIP PACKAGE</h3>
<p class="price">299 บาท</p>
<a class="buy" href="#">ซื้อสินค้า</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?2">
<div class="card-content">
<h3>PREMIUM PACKAGE</h3>
<p class="price">499 บาท</p>
<a class="buy" href="#">ซื้อสินค้า</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?3">
<div class="card-content">
<h3>ULTIMATE PACKAGE</h3>
<p class="price">999 บาท</p>
<a class="buy" href="#">ซื้อสินค้า</a>
</div>
</div>

</div>

</section>

<footer>
© 2026 BIG BOSS STORE
</footer>

</body>
</html>
